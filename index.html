<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-100 antialiased">
    <main class="flex min-h-screen items-center justify-center px-4">
      <section class="w-full max-w-md rounded-2xl bg-white p-8 shadow-xl shadow-slate-200">
        <div class="mb-8 text-center">
          <h1 class="text-2xl font-bold text-slate-900">Login</h1>
          <p class="mt-2 text-sm text-slate-500">Frontend-only login form</p>
        </div>

        <form class="space-y-5" action="#" method="post" novalidate>
          <div>
            <label for="email" class="mb-2 block text-sm font-medium text-slate-700">Email</label>
            <input
              id="email"
              name="email"
              type="email"
              placeholder="you@example.com"
              class="w-full rounded-xl border border-slate-300 px-4 py-3 text-slate-900 placeholder:text-slate-400 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-200"
              required
            />
          </div>

          <div>
            <div class="mb-2 flex items-center justify-between">
              <label for="password" class="block text-sm font-medium text-slate-700">Password</label>
              <a href="#" class="text-sm text-blue-600 hover:text-blue-700">Forgot password?</a>
            </div>
            <input
              id="password"
              name="password"
              type="password"
              placeholder="••••••••"
              class="w-full rounded-xl border border-slate-300 px-4 py-3 text-slate-900 placeholder:text-slate-400 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-200"
              required
            />
          </div>

          <label class="flex items-center gap-2 text-sm text-slate-600">
            <input type="checkbox" class="h-4 w-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500" />
            Remember me
          </label>

          <button
            type="submit"
            class="w-full rounded-xl bg-blue-600 px-4 py-3 font-semibold text-white transition hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-300"
          >
            Sign In
          </button>
        </form>

        <p class="mt-6 text-center text-sm text-slate-500">
          Don't have an account?
          <a href="#" class="font-medium text-blue-600 hover:text-blue-700">Sign up</a>
        </p>
      </section>
    </main>
  </body>
</html>
